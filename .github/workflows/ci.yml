name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELIXIR_VERSION: "1.18"
  # OTP 28 + Elixir 1.18 breaks regexes in module attributes in some transitive deps.
  OTP_VERSION: "27"

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selecto_components
        uses: actions/checkout@v4

      - name: Checkout selecto
        uses: actions/checkout@v4
        with:
          repository: selecto-elixir/selecto
          ref: main
          path: selecto

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
