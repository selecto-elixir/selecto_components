name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELIXIR_VERSION: "1.20.0"
  OTP_VERSION: "29.0"
  SELECTO_ECOSYSTEM_USE_LOCAL: "1"

jobs:
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: selecto_components

    steps:
      - name: Checkout selecto_components
        uses: actions/checkout@v4
        with:
          path: selecto_components

      - name: Checkout selecto
        uses: actions/checkout@v4
        with:
          repository: selecto-elixir/selecto
          ref: main
          path: selecto

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            selecto_components/deps
            selecto_components/_build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('selecto_components/mix.exs', 'selecto_components/mix.lock', 'selecto/mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Run precommit checks
        run: mix precommit
